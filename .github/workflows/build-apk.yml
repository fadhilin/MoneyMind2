name: Build Android APK (Capacitor)

on:
  workflow_dispatch: # Ini akan memunculkan tombol 'Run' manual di GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install Dependencies & Build Web
        run: |
          cd apps/web
          npm install
          npm run build

      - name: 🔄 Sync Capacitor
        run: |
          cd apps/web
          npx cap sync android

      - name: ☕ Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 🔨 Build APK
        run: |
          cd apps/web/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoneyMind-APK
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
